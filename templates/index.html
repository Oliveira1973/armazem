<!DOCTYPE html>
<html>
<head>
    <title>Gestão de Armazém</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2>Gestão de Armazém</h2>

<form method="GET" class="mb-3">
    <input type="text" name="search" placeholder="Pesquisar..." class="form-control">
</form>

<table class="table table-bordered">
    <tr>
        <th>Código</th>
        <th>Descrição</th>
        <th>Localização</th>
        <th>Quantidade</th>
        <th>Ações</th>
    </tr>
    {% for m in materiais %}
    <tr>
        <td>{{ m[1] }}</td>
        <td>{{ m[2] }}</td>
        <td>{{ m[3] }}</td>
        <td>{{ m[4] }}</td>
        <td>
            <a href="/edit/{{ m[0] }}" class="btn btn-sm btn-warning">Editar</a>
        </td>
    </tr>
    {% endfor %}
</table>

<h4>Adicionar Material</h4>
<form method="POST" action="/add">
    <input name="codigo" placeholder="Código" class="form-control mb-2" required>
    <input name="descricao" placeholder="Descrição" class="form-control mb-2" required>
    <input name="localizacao" placeholder="Localização" class="form-control mb-2" required>
    <input name="quantidade" type="number" placeholder="Quantidade" class="form-control mb-2" required>
    <button class="btn btn-primary">Adicionar</button>
</form>

</body>
</html>
