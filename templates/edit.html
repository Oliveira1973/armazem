<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Editar Material</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2>Editar Material</h2>

<form method="POST" action="/update/{{ material[0] }}">
    <input name="codigo" value="{{ material[1] }}" class="form-control mb-2" required>
    <input name="descricao" value="{{ material[2] }}" class="form-control mb-2" required>
    <input name="localizacao" value="{{ material[3] }}" class="form-control mb-2" required>
    <input name="quantidade" type="number" value="{{ material[4] }}" class="form-control mb-2" required>
    <button class="btn btn-success">Guardar Alterações</button>
    <a href="/" class="btn btn-secondary">Cancelar</a>
</form>

</body>
</html>
